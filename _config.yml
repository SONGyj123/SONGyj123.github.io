title: SONGyj123 # name of the site
author: Songyj # name of site's author
email: songyj0129@gmail.com # email of site's author
url: https://songyj123.github.io # root address of the site
baseurl: "" # subpath of the site, e.g. "/blog" (leave it blank "" if you're site shouldn't use a subpath)
description: > # description of the site (multiple lines allowed)
  description

permalink: /:slug.html

favicon: "logo.png" # name+extension of favicon (which must be put on the root folder)

version:          1.0
gitbook_version:  3.2.3

remote_theme: sighingnow/jekyll-gitbook #riggraz/no-style-please # if you are using GitHub Pages, change it to remote_theme: riggraz/no-style-please

toc:
  enabled: true

markdown:         kramdown
kramdown:
  auto_ids:               true
  input:                  GFM
  math_engine:            mathjax
  smart_quotes:           lsquo,rsquo,ldquo,rdquo
  toc_levels:             1..6
  syntax_highlighter:     rouge
  syntax_highlighter_opts:
    guess_lang:           true

syntax_highlighter_style: colorful

markdown_ext:             markdown,mkdown,mkdn,mkd,md

theme_config:
  appearance: "light" # can be "light", "dark" or "auto"
  back_home_text: "../" # customize text for homepage link in post layout
  date_format: "%Y-%m-%d" # customize how date is formatted
  show_description: false # show blog description in home page
  lowercase_titles: false # show titles in lowercase in lists

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jektex
  - jekyll-readme-index
  - jemoji

